name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: npm run check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: yppon_portal
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_USER: yppon_ci
        options: >-
          --health-cmd "pg_isready -U yppon_ci -d yppon_portal"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://yppon_ci@127.0.0.1:5432/yppon_portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:migrate -w @yppon/api

      - name: Seed development data
        run: npm run db:seed -w @yppon/api

      - name: Run checks
        run: npm run check
