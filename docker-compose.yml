services:
  postgres:
    image: postgres:16-alpine
    container_name: yppon-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yppon_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yppon}
      POSTGRES_USER: ${POSTGRES_USER:-yppon}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - yppon_postgres_data:/var/lib/postgresql/data

volumes:
  yppon_postgres_data:
